name: Build Test SonarQube Deploy

on:
  push:
    branches:
      - main

jobs:
  build-sonar-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Validate
        run: mvn validate

      - name: Compile
        run: mvn compile

      - name: Test
        run: mvn test

      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=train-ticket-reservation \
            -Dsonar.host.url=${{ secrets.SONARQUBE_HOST }} \
            -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }}

      - name: Package
        run: mvn clean package -DskipTests

      - name: Verify WAR
        run: ls -lh target/

      - name: Copy WAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/*.war
          target: /home/ubuntu/

      - name: Deploy in Tomcat
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /home/ubuntu/apache-tomcat-9.0.98
            cd /home/ubuntu/apache-tomcat-9.0.98/bin
            ./shutdown.sh || true
            sleep 10
            rm -rf /home/ubuntu/apache-tomcat-9.0.98/webapps/*
            cp /home/ubuntu/target/*.war /home/ubuntu/apache-tomcat-9.0.98/webapps/ROOT.war
            ./startup.sh
